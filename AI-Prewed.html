<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AI Prewed Generator PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #fff9f0;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0px 0px 20px rgba(200,150,80,0.20);
            border: 2px solid #e4c28b;
        }
        h2 {
            text-align: center;
            color: #c8a059;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        select, input[type="file"], input[type="range"] {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #c8a059;
        }
        button {
            width: 100%;
            background: #c8a059;
            border: none;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #fff4dd;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #c8a059;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AI Prewed Generator PRO</h2>

    <label>Upload Foto (1 atau 2 orang)</label>
    <input type="file" id="photo" accept="image/*">

    <label>Jumlah Hasil (1–5)</label>
    <input type="range" id="jumlah" min="1" max="5" value="3" 
           oninput="document.getElementById('jumlahLabel').innerText = this.value">
    <div>Dipilih: <span id="jumlahLabel">3</span></div>

    <label>Background</label>
    <select id="bg">
        <option value="indoor">Indoor</option>
        <option value="outdoor">Outdoor</option>
        <option value="studio">Studio</option>
        <option value="vintage">Vintage</option>
    </select>

    <label>Outfit</label>
    <select id="outfit">
        <option value="casual modern">Casual Modern</option>
        <option value="kebaya & beskap">Kebaya & Beskap</option>
        <option value="gaun elegan & jas hitam">Gaun Elegan & Jas Hitam</option>
        <option value="prewed glam gold">Prewed Glam Gold</option>
        <option value="korean soft tone">Korean Soft Tone</option>
    </select>

    <button onclick="generate()">Generate Prompt</button>

    <div id="output"></div>
</div>

<script>
function generate() {
    const jumlah = document.getElementById("jumlah").value;
    const bg = document.getElementById("bg").value;
    const outfit = document.getElementById("outfit").value;

    let prompt = 
`PREWED PHOTO GENERATOR

Jumlah Output: ${jumlah}
Background: ${bg}
Outfit: ${outfit}

Deskripsi Gaya:
Foto prewedding premium tone gold-white, gaya studio foto modern,
pencahayaan soft, kulit glowing natural, komposisi simetris, gaya elegan,
pose romantis, detail kain jelas, kualitas HD 1200px.

Prompt AI:
"Studio prewedding photo of a couple, ${outfit}, ${bg} background, premium lighting, soft-focus, elegant modern wedding tone gold-white, cinematic photography, HD 1200px, realistic, beautiful skin texture"

Gunakan ini di: Hunyuan, Midjourney, atau AI Studio.
`;

    document.getElementById("output").innerText = prompt;
}
</script>

</body>
</html>
